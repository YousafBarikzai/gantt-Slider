name: Publish on NPM
# This repo is a private Project Planner deployment, not the upstream npm
# library — don't auto-publish on every merge to master. Run manually from the
# Actions tab if a release is ever actually wanted.
on:
    workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 9
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'

            - run: pnpm install
            - run: pnpm prettier-check
            - run: pnpm build
            - run: npm publish
