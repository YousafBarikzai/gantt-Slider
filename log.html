<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Activity Log · Project Planner</title>
        <link rel="stylesheet" href="vendor/bootstrap.min.css" />
        <style>
            body {
                margin: 0;
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
                background: #f8fafc;
            }
            .page { margin: 1.5rem; }
            .filters { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
            table { background: #fff; }
            .action-badge {
                font-size: 0.7rem; text-transform: uppercase; padding: 0.1rem 0.45rem;
                border-radius: 4px; font-weight: 600;
            }
            .action-create { background: #dcfce7; color: #166534; }
            .action-update { background: #dbeafe; color: #1e40af; }
            .action-delete { background: #fee2e2; color: #991b1b; }
            .action-comment { background: #fef9c3; color: #854d0e; }
            .action-login { background: #f1f5f9; color: #475569; }
        </style>
    </head>
    <body>
        <div id="app-nav" class="app-nav"></div>
        <div class="page">
            <h3>Activity Log</h3>
            <p class="text-muted small">
                Every change anyone makes is recorded here automatically.
            </p>
            <div class="filters">
                <select id="filter-user" class="form-select form-select-sm" style="width:auto">
                    <option value="">All people</option>
                </select>
                <select id="filter-type" class="form-select form-select-sm" style="width:auto">
                    <option value="">All activity</option>
                    <option value="task">Tasks</option>
                    <option value="comment">Comments</option>
                    <option value="user">People</option>
                    <option value="auth">Sign-ins</option>
                </select>
                <button id="refresh" class="btn btn-sm btn-outline-secondary">Refresh</button>
            </div>
            <table class="table table-sm table-hover align-middle">
                <thead>
                    <tr>
                        <th style="width:140px">When</th>
                        <th style="width:110px">Who</th>
                        <th style="width:90px">Action</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="log-body"></tbody>
            </table>
        </div>

        <script type="module">
            import {
                api,
                requireSession,
                renderNav,
                NAV_CSS,
                escapeHtml,
                timeAgo,
            } from './app.js';

            const style = document.createElement('style');
            style.textContent = NAV_CSS;
            document.head.appendChild(style);

            const user = await requireSession();
            renderNav(user, 'log');

            const users = await api('/users');
            document.getElementById('filter-user').innerHTML +=
                users
                    .map((u) => `<option>${escapeHtml(u.name)}</option>`)
                    .join('');

            async function load() {
                const params = new URLSearchParams();
                const u = document.getElementById('filter-user').value;
                const t = document.getElementById('filter-type').value;
                if (u) params.set('user', u);
                if (t) params.set('entity_type', t);
                const logs = await api('/logs?' + params.toString());
                document.getElementById('log-body').innerHTML = logs.length
                    ? logs
                          .map(
                              (l) => `<tr>
                                <td class="text-muted small">${timeAgo(l.created_at)}</td>
                                <td>${escapeHtml(l.user_name)}</td>
                                <td><span class="action-badge action-${l.action}">${l.action}</span></td>
                                <td>${escapeHtml(l.summary)}</td>
                              </tr>`,
                          )
                          .join('')
                    : '<tr><td colspan="4" class="text-muted text-center py-4">No activity yet.</td></tr>';
            }

            document.getElementById('filter-user').onchange = load;
            document.getElementById('filter-type').onchange = load;
            document.getElementById('refresh').onclick = load;
            await load();
        </script>
    </body>
</html>
