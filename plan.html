<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Detailed Plan · Project Planner</title>
        <link rel="stylesheet" href="vendor/bootstrap.min.css" />
        <style>
            body {
                margin: 0;
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
                background: #f8fafc;
            }
            .toolbar {
                display: flex;
                align-items: center;
                gap: 0.5rem 0.75rem;
                padding: 0.75rem 1.5rem;
                background: #fff;
                border-bottom: 1px solid #e2e8f0;
                flex-wrap: wrap;
            }
            .toolbar h2 {
                font-size: 1.1rem;
                margin: 0;
                flex: 1;
                min-width: 160px;
            }
            /* Horizontal scroll keeps the wide plan usable on small screens */
            .plan-scroll {
                margin: 1rem 1.5rem;
                overflow-x: auto;
                border: 1px solid #e2e8f0;
                border-radius: 10px;
                background: #fff;
            }
            .plan {
                min-width: 900px;
            }
            .plan-head,
            .row {
                display: grid;
                grid-template-columns:
                    minmax(240px, 2.4fr) 132px 86px 140px 170px 120px 120px;
                align-items: center;
            }
            .plan-head {
                position: sticky;
                top: 0;
                z-index: 2;
                background: #f1f5f9;
                font-size: 0.72rem;
                text-transform: uppercase;
                letter-spacing: 0.03em;
                font-weight: 700;
                color: #475569;
                border-bottom: 2px solid #e2e8f0;
            }
            .plan-head > div,
            .row > div {
                padding: 0.5rem 0.6rem;
                overflow: hidden;
            }
            .row {
                border-bottom: 1px solid #f1f5f9;
                font-size: 0.85rem;
            }
            .ws-row {
                background: #eef2ff;
                font-weight: 700;
                cursor: pointer;
                border-bottom: 1px solid #c7d2fe;
            }
            .ss-row {
                background: #f8fafc;
                font-weight: 600;
                cursor: pointer;
            }
            .name-cell {
                display: flex;
                align-items: center;
                gap: 0.35rem;
            }
            .ss-row .name-cell {
                padding-left: 1.3rem;
            }
            .task-row .name-cell {
                padding-left: 2.5rem;
                font-weight: 400;
            }
            .caret {
                display: inline-block;
                width: 0.9rem;
                font-size: 0.7rem;
                color: #64748b;
                transition: transform 0.15s ease;
            }
            .collapsed > .ws-row .caret,
            .collapsed > .ss-row .caret {
                transform: rotate(-90deg);
            }
            .collapsed > .ws-body,
            .collapsed > .ss-body {
                display: none;
            }
            .bar {
                display: inline-block;
                width: 70px;
                height: 8px;
                border-radius: 6px;
                background: #e2e8f0;
                overflow: hidden;
                vertical-align: middle;
                margin-right: 0.4rem;
            }
            .bar > i {
                display: block;
                height: 100%;
                background: #2563eb;
            }
            .cell-input {
                width: 100%;
                font-size: 0.8rem;
                padding: 0.15rem 0.3rem;
                border: 1px solid #e2e8f0;
                border-radius: 6px;
                background: #fff;
            }
            .cell-input:disabled {
                background: #f8fafc;
                color: #475569;
            }
            .muted {
                color: #94a3b8;
            }
            .chip {
                font-size: 0.68rem;
                padding: 0.05rem 0.4rem;
                border-radius: 999px;
                background: #e0e7ff;
                color: #3730a3;
                margin-left: 0.4rem;
            }
            @media (max-width: 640px) {
                .plan-scroll,
                .toolbar {
                    margin-left: 0.5rem;
                    margin-right: 0.5rem;
                }
            }
        </style>
    </head>
    <body>
        <div id="app-nav" class="app-nav"></div>

        <div class="toolbar">
            <h2>Detailed Plan</h2>
            <button id="expand-all" class="btn btn-sm btn-outline-secondary">Expand all</button>
            <button id="collapse-all" class="btn btn-sm btn-outline-secondary">Collapse all</button>
            <button id="add-task-btn" class="btn btn-sm btn-primary">+ New task</button>
        </div>

        <div class="plan-scroll">
            <div class="plan">
                <div class="plan-head">
                    <div>Work stream / Sub-stage / Task</div>
                    <div>Owner</div>
                    <div>Hours</div>
                    <div>Status</div>
                    <div>Progress</div>
                    <div>Start</div>
                    <div>End</div>
                </div>
                <div id="plan-body"></div>
            </div>
        </div>

        <!-- Add task modal -->
        <div class="modal fade" id="add-modal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">New task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="add-form">
                        <div class="modal-body">
                            <div class="row g-2">
                                <div class="col-12">
                                    <label class="form-label small fw-semibold">Task name</label>
                                    <input id="a-name" class="form-control form-control-sm" required />
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-semibold">Work stream</label>
                                    <input id="a-ws" class="form-control form-control-sm" list="ws-list" />
                                    <datalist id="ws-list"></datalist>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-semibold">Sub-stage</label>
                                    <input id="a-ss" class="form-control form-control-sm" />
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-semibold">Hours</label>
                                    <select id="a-hours" class="form-select form-select-sm"></select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-semibold">Status</label>
                                    <select id="a-status" class="form-select form-select-sm"></select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-semibold">Start</label>
                                    <input id="a-start" type="date" class="form-control form-control-sm" required />
                                </div>
                                <div class="col-6">
                                    <label class="form-label small fw-semibold">End</label>
                                    <input id="a-end" type="date" class="form-control form-control-sm" required />
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Add task</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="vendor/bootstrap.bundle.min.js"></script>
        <script type="module">
            import {
                api,
                requireSession,
                renderNav,
                NAV_CSS,
                escapeHtml,
            } from './app.js';

            const style = document.createElement('style');
            style.textContent = NAV_CSS;
            document.head.appendChild(style);

            const user = await requireSession();
            const isGuest = user.role === 'guest';
            renderNav(user, 'plan');

            const users = await api('/users');
            const HOURS = ['', 1, 2, 4, 8, 16, 24, 40, 80, 120, 160];
            const STATUSES = ['Backlog', 'To Do', 'In Progress', 'Review', 'Done'];
            const collapsed = new Set();
            let tasks = [];

            const body = document.getElementById('plan-body');

            // % of work done across a group = average of its tasks' progress.
            function rollup(list) {
                if (!list.length) return 0;
                return Math.round(
                    list.reduce((s, t) => s + (t.progress || 0), 0) / list.length,
                );
            }
            const sumHours = (list) =>
                list.reduce((s, t) => s + (t.hours || 0), 0);

            function group(list) {
                const order = [];
                const map = new Map();
                for (const t of list) {
                    const ws = t.work_stream || 'Uncategorised';
                    const ss = t.sub_stage || 'General';
                    if (!map.has(ws)) {
                        map.set(ws, new Map());
                        order.push(ws);
                    }
                    const sm = map.get(ws);
                    if (!sm.has(ss)) sm.set(ss, []);
                    sm.get(ss).push(t);
                }
                return order.map((ws) => {
                    const sm = map.get(ws);
                    const subs = [...sm.keys()].map((ss) => ({
                        ss,
                        items: sm.get(ss),
                    }));
                    return { ws, subs, all: subs.flatMap((s) => s.items) };
                });
            }

            const bar = (pct) =>
                `<span class="bar"><i style="width:${pct}%"></i></span>${pct}%`;
            const dis = isGuest ? 'disabled' : '';

            function ownerSelect(t) {
                return `<select class="cell-input" data-id="${t.id}" data-field="assignee_id" ${dis}>
                    <option value="">—</option>
                    ${users
                        .map(
                            (u) =>
                                `<option value="${u.id}" ${u.id === t.assignee_id ? 'selected' : ''}>${escapeHtml(u.name)}</option>`,
                        )
                        .join('')}
                </select>`;
            }
            function hoursSelect(t) {
                return `<select class="cell-input" data-id="${t.id}" data-field="hours" ${dis}>
                    ${HOURS.map(
                        (h) =>
                            `<option value="${h}" ${String(h) === String(t.hours ?? '') ? 'selected' : ''}>${h === '' ? '—' : h + 'h'}</option>`,
                    ).join('')}
                </select>`;
            }
            function statusSelect(t) {
                return `<select class="cell-input" data-id="${t.id}" data-field="status" ${dis}>
                    ${STATUSES.map(
                        (s) => `<option ${s === t.status ? 'selected' : ''}>${s}</option>`,
                    ).join('')}
                </select>`;
            }

            function render() {
                const groups = group(tasks);
                if (!groups.length) {
                    body.innerHTML =
                        '<div class="row"><div class="muted" style="padding:1.5rem">No tasks yet' +
                        (isGuest ? '.' : ' — add one with “+ New task”.') +
                        '</div></div>';
                    return;
                }
                body.innerHTML = groups
                    .map((g) => {
                        const wsKey = 'ws:' + g.ws;
                        const wsCollapsed = collapsed.has(wsKey) ? 'collapsed' : '';
                        const subsHtml = g.subs
                            .map((s) => {
                                const ssKey = 'ss:' + g.ws + '>>' + s.ss;
                                const ssCollapsed = collapsed.has(ssKey)
                                    ? 'collapsed'
                                    : '';
                                const taskRows = s.items
                                    .map(
                                        (t) => `
                                    <div class="row task-row">
                                        <div class="name-cell">${escapeHtml(t.name)}</div>
                                        <div>${ownerSelect(t)}</div>
                                        <div>${hoursSelect(t)}</div>
                                        <div>${statusSelect(t)}</div>
                                        <div><input type="number" min="0" max="100" class="cell-input" style="width:64px" data-id="${t.id}" data-field="progress" value="${t.progress}" ${dis} /> %</div>
                                        <div><input type="date" class="cell-input" data-id="${t.id}" data-field="start" value="${t.start}" ${dis} /></div>
                                        <div><input type="date" class="cell-input" data-id="${t.id}" data-field="end" value="${t.end}" ${dis} /></div>
                                    </div>`,
                                    )
                                    .join('');
                                return `<div class="ss ${ssCollapsed}">
                                    <div class="row ss-row" data-toggle="${ssKey.replace(/"/g, '')}">
                                        <div class="name-cell"><span class="caret">▾</span>${escapeHtml(s.ss)} <span class="chip">${s.items.length}</span></div>
                                        <div></div>
                                        <div class="muted">${sumHours(s.items) || ''}${sumHours(s.items) ? 'h' : ''}</div>
                                        <div></div>
                                        <div>${bar(rollup(s.items))}</div>
                                        <div></div><div></div>
                                    </div>
                                    <div class="ss-body">${taskRows}</div>
                                </div>`;
                            })
                            .join('');
                        return `<div class="ws ${wsCollapsed}">
                            <div class="row ws-row" data-toggle="${wsKey.replace(/"/g, '')}">
                                <div class="name-cell"><span class="caret">▾</span>${escapeHtml(g.ws)} <span class="chip">${g.all.length} tasks</span></div>
                                <div></div>
                                <div>${sumHours(g.all) || ''}${sumHours(g.all) ? 'h' : ''}</div>
                                <div></div>
                                <div>${bar(rollup(g.all))}</div>
                                <div></div><div></div>
                            </div>
                            <div class="ws-body">${subsHtml}</div>
                        </div>`;
                    })
                    .join('');
            }

            // Collapse / expand
            body.addEventListener('click', (e) => {
                const head = e.target.closest('[data-toggle]');
                if (!head) return;
                const key = head.dataset.toggle;
                collapsed.has(key) ? collapsed.delete(key) : collapsed.add(key);
                render();
            });

            // Inline edits -> save + refresh roll-ups
            body.addEventListener('change', async (e) => {
                const el = e.target;
                if (!el.dataset.id || !el.dataset.field) return;
                let value = el.value;
                if (el.dataset.field === 'hours')
                    value = value === '' ? null : Number(value);
                else if (el.dataset.field === 'assignee_id')
                    value = value === '' ? null : Number(value);
                else if (el.dataset.field === 'progress')
                    value = Math.max(0, Math.min(100, Number(value) || 0));
                try {
                    const updated = await api('/tasks/' + el.dataset.id, {
                        method: 'PATCH',
                        body: { [el.dataset.field]: value },
                    });
                    const i = tasks.findIndex((t) => t.id === el.dataset.id);
                    if (i >= 0) tasks[i] = updated;
                    render();
                } catch (err) {
                    alert('Could not save: ' + err.message);
                }
            });

            document.getElementById('expand-all').onclick = () => {
                collapsed.clear();
                render();
            };
            document.getElementById('collapse-all').onclick = () => {
                for (const g of group(tasks)) {
                    collapsed.add('ws:' + g.ws);
                    for (const s of g.subs)
                        collapsed.add('ss:' + g.ws + '>>' + s.ss);
                }
                render();
            };

            // ---- Add task ----
            const addBtn = document.getElementById('add-task-btn');
            if (isGuest) addBtn.style.display = 'none';
            else {
                const addModal = new bootstrap.Modal('#add-modal');
                document.getElementById('a-hours').innerHTML = HOURS.map(
                    (h) => `<option value="${h}">${h === '' ? '—' : h + 'h'}</option>`,
                ).join('');
                document.getElementById('a-status').innerHTML = STATUSES.map(
                    (s) => `<option>${s}</option>`,
                ).join('');
                addBtn.onclick = () => {
                    document.getElementById('add-form').reset();
                    // suggest existing work streams
                    document.getElementById('ws-list').innerHTML = [
                        ...new Set(tasks.map((t) => t.work_stream).filter(Boolean)),
                    ]
                        .map((w) => `<option value="${escapeHtml(w)}">`)
                        .join('');
                    const today = new Date().toISOString().slice(0, 10);
                    const end = new Date();
                    end.setDate(end.getDate() + 5);
                    document.getElementById('a-start').value = today;
                    document.getElementById('a-end').value = end
                        .toISOString()
                        .slice(0, 10);
                    addModal.show();
                };
                document.getElementById('add-form').onsubmit = async (e) => {
                    e.preventDefault();
                    const hv = document.getElementById('a-hours').value;
                    await api('/tasks', {
                        method: 'POST',
                        body: {
                            name: document.getElementById('a-name').value,
                            work_stream: document.getElementById('a-ws').value,
                            sub_stage: document.getElementById('a-ss').value,
                            hours: hv === '' ? null : Number(hv),
                            status: document.getElementById('a-status').value,
                            start: document.getElementById('a-start').value,
                            end: document.getElementById('a-end').value,
                        },
                    });
                    addModal.hide();
                    tasks = await api('/tasks');
                    render();
                };
            }

            tasks = await api('/tasks');
            render();
        </script>
    </body>
</html>
