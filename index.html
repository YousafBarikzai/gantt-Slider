<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Board · Project Planner</title>
        <link rel="stylesheet" href="dist/frappe-gantt.css" />
        <link rel="stylesheet" href="vendor/bootstrap.min.css" />
        <style>
            body {
                margin: 0;
                font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
                background: #f8fafc;
            }
            .toolbar {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                padding: 0.75rem 1.5rem;
                background: #fff;
                border-bottom: 1px solid #e2e8f0;
                flex-wrap: wrap;
            }
            .toolbar h2 {
                font-size: 1.1rem;
                margin: 0;
                flex: 1;
            }
            #gantt-wrap {
                margin: 1.25rem 1.5rem;
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 10px;
                overflow: auto;
            }
            /* Status-based bar colours */
            .bar-Backlog .bar { fill: #94a3b8; }
            .bar-ToDo .bar { fill: #38bdf8; }
            .bar-InProgress .bar { fill: #2563eb; }
            .bar-Review .bar { fill: #f59e0b; }
            .bar-Done .bar { fill: #22c55e; }

            .status-pill, .prio-pill {
                font-size: 0.72rem; padding: 0.15rem 0.55rem;
                border-radius: 999px; font-weight: 600;
            }
            .panel-section { border-top: 1px solid #e2e8f0; padding-top: 1rem; margin-top: 1rem; }
            .comment {
                background: #f1f5f9; border-radius: 8px; padding: 0.6rem 0.8rem;
                margin-bottom: 0.6rem;
            }
            .comment .meta { font-size: 0.72rem; color: #64748b; margin-bottom: 0.2rem; }
            .history-item {
                font-size: 0.82rem; padding: 0.4rem 0; border-bottom: 1px dashed #e2e8f0;
                color: #334155;
            }
            .history-item .when { color: #94a3b8; font-size: 0.72rem; }
        </style>
    </head>
    <body>
        <div id="app-nav" class="app-nav"></div>

        <div class="toolbar">
            <h2>Project Timeline</h2>
            <select id="view-mode" class="form-select form-select-sm" style="width:auto">
                <option>Day</option>
                <option selected>Week</option>
                <option>Month</option>
            </select>
            <button id="today-btn" class="btn btn-sm btn-outline-secondary">Today</button>
            <button id="add-task-btn" class="btn btn-sm btn-primary">+ New task</button>
        </div>

        <div id="gantt-wrap"><svg id="gantt"></svg></div>

        <!-- ===== Task detail panel ===== -->
        <div
            class="offcanvas offcanvas-end"
            tabindex="-1"
            id="task-panel"
            style="width: 460px"
        >
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="panel-title">Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <div class="mb-2">
                    <label class="form-label small fw-semibold">Title</label>
                    <input id="f-name" class="form-control form-control-sm" />
                </div>
                <div class="row g-2">
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Status</label>
                        <select id="f-status" class="form-select form-select-sm">
                            <option>Backlog</option><option>To Do</option>
                            <option>In Progress</option><option>Review</option>
                            <option>Done</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Priority</label>
                        <select id="f-priority" class="form-select form-select-sm">
                            <option>Low</option><option>Medium</option>
                            <option>High</option><option>Critical</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Assignee</label>
                        <select id="f-assignee" class="form-select form-select-sm"></select>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Progress</label>
                        <input id="f-progress" type="number" min="0" max="100"
                               class="form-control form-control-sm" />
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Start</label>
                        <input id="f-start" type="date" class="form-control form-control-sm" />
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-semibold">End</label>
                        <input id="f-end" type="date" class="form-control form-control-sm" />
                    </div>
                </div>
                <div class="mt-2">
                    <label class="form-label small fw-semibold">Description / criteria</label>
                    <textarea id="f-description" rows="3" class="form-control form-control-sm"></textarea>
                </div>
                <div class="d-flex gap-2 mt-2" id="panel-actions">
                    <button id="save-task" class="btn btn-sm btn-primary">Save changes</button>
                    <button id="delete-task" class="btn btn-sm btn-outline-danger ms-auto">Delete</button>
                </div>

                <!-- Discussion -->
                <div class="panel-section">
                    <h6 class="fw-bold">Discussion</h6>
                    <div id="comments"></div>
                    <div id="comment-box" class="input-group input-group-sm mt-2">
                        <input id="comment-input" class="form-control" placeholder="Add a comment…" />
                        <button id="comment-send" class="btn btn-primary">Post</button>
                    </div>
                </div>

                <!-- History -->
                <div class="panel-section">
                    <h6 class="fw-bold">History</h6>
                    <div id="history"></div>
                </div>
            </div>
        </div>

        <script src="dist/frappe-gantt.umd.js"></script>
        <script src="vendor/bootstrap.bundle.min.js"></script>

        <script type="module">
            import {
                api,
                requireSession,
                renderNav,
                NAV_CSS,
                escapeHtml,
                timeAgo,
            } from './app.js';

            const style = document.createElement('style');
            style.textContent = NAV_CSS;
            document.head.appendChild(style);

            const user = await requireSession();
            const isGuest = user.role === 'guest';
            renderNav(user, 'board');

            let users = await api('/users');
            let tasks = [];
            let gantt;
            let currentId = null;

            const fmt = (d) => {
                const dt = d instanceof Date ? d : new Date(d);
                return dt.toISOString().slice(0, 10);
            };
            const statusClass = (s) => 'bar-' + s.replace(/\s+/g, '');

            function toGanttTask(t) {
                return {
                    id: t.id,
                    name: t.name,
                    start: t.start,
                    end: t.end,
                    progress: t.progress,
                    dependencies: t.dependencies,
                    custom_class: statusClass(t.status),
                };
            }

            async function loadTasks() {
                tasks = await api('/tasks');
                renderGantt();
            }

            function renderGantt() {
                const wrap = document.getElementById('gantt-wrap');
                if (!tasks.length) {
                    wrap.innerHTML =
                        '<p class="text-muted text-center py-5 m-0">No tasks yet.' +
                        (isGuest ? '' : ' Use “+ New task” to add one.') +
                        '</p>';
                    return;
                }
                // Fresh SVG each render so wrapper containers don't accumulate.
                wrap.innerHTML = '<svg id="gantt"></svg>';
                gantt = new Gantt('#gantt', tasks.map(toGanttTask), {
                    view_mode: document.getElementById('view-mode').value,
                    readonly: isGuest,
                    popup_on: 'click',
                    on_click: (t) => openPanel(t.id),
                    on_date_change: async (t, start, end) => {
                        await api('/tasks/' + t.id, {
                            method: 'PATCH',
                            body: { start: fmt(start), end: fmt(end) },
                        });
                        await refreshTask(t.id);
                    },
                    on_progress_change: async (t, progress) => {
                        await api('/tasks/' + t.id, {
                            method: 'PATCH',
                            body: { progress: Math.round(progress) },
                        });
                        await refreshTask(t.id);
                    },
                });
            }

            async function refreshTask(id) {
                const updated = await api('/tasks/' + id);
                const i = tasks.findIndex((t) => t.id === id);
                if (i >= 0) tasks[i] = updated;
            }

            // ---------- Task detail panel ----------
            // Guard against a missing Bootstrap so the board still loads.
            const panel = window.bootstrap
                ? new bootstrap.Offcanvas('#task-panel')
                : {
                      show: () =>
                          document
                              .getElementById('task-panel')
                              .classList.add('show'),
                      hide: () =>
                          document
                              .getElementById('task-panel')
                              .classList.remove('show'),
                  };
            const assigneeSel = document.getElementById('f-assignee');
            assigneeSel.innerHTML =
                '<option value="">Unassigned</option>' +
                users
                    .map((u) => `<option value="${u.id}">${escapeHtml(u.name)}</option>`)
                    .join('');

            function setReadonly() {
                if (!isGuest) return;
                document
                    .querySelectorAll(
                        '#task-panel input, #task-panel select, #task-panel textarea, #task-panel button:not(.btn-close)',
                    )
                    .forEach((el) => (el.disabled = true));
                document.getElementById('comment-box').style.display = 'none';
                document.getElementById('panel-actions').style.display = 'none';
                document.getElementById('add-task-btn').style.display = 'none';
            }

            async function openPanel(id) {
                currentId = id;
                const t = await api('/tasks/' + id);
                document.getElementById('panel-title').textContent = t.name;
                document.getElementById('f-name').value = t.name;
                document.getElementById('f-status').value = t.status;
                document.getElementById('f-priority').value = t.priority;
                document.getElementById('f-assignee').value = t.assignee_id || '';
                document.getElementById('f-progress').value = t.progress;
                document.getElementById('f-start').value = t.start;
                document.getElementById('f-end').value = t.end;
                document.getElementById('f-description').value = t.description;
                await Promise.all([loadComments(id), loadHistory(id)]);
                setReadonly();
                panel.show();
            }

            async function loadComments(id) {
                const comments = await api(`/tasks/${id}/comments`);
                document.getElementById('comments').innerHTML = comments.length
                    ? comments
                          .map(
                              (c) => `<div class="comment">
                                <div class="meta">${escapeHtml(c.user_name)} · ${timeAgo(c.created_at)}</div>
                                <div>${escapeHtml(c.body)}</div></div>`,
                          )
                          .join('')
                    : '<p class="text-muted small">No comments yet.</p>';
            }

            async function loadHistory(id) {
                const items = await api(`/tasks/${id}/history`);
                document.getElementById('history').innerHTML = items.length
                    ? items
                          .map(
                              (h) => `<div class="history-item">${escapeHtml(h.summary)}
                                <div class="when">${timeAgo(h.created_at)}</div></div>`,
                          )
                          .join('')
                    : '<p class="text-muted small">No history yet.</p>';
            }

            document.getElementById('save-task').onclick = async () => {
                await api('/tasks/' + currentId, {
                    method: 'PATCH',
                    body: {
                        name: document.getElementById('f-name').value,
                        status: document.getElementById('f-status').value,
                        priority: document.getElementById('f-priority').value,
                        assignee_id:
                            document.getElementById('f-assignee').value || null,
                        progress: Number(document.getElementById('f-progress').value),
                        start: document.getElementById('f-start').value,
                        end: document.getElementById('f-end').value,
                        description: document.getElementById('f-description').value,
                    },
                });
                await loadTasks();
                await loadHistory(currentId);
            };

            document.getElementById('delete-task').onclick = async () => {
                if (!confirm('Delete this task?')) return;
                await api('/tasks/' + currentId, { method: 'DELETE' });
                panel.hide();
                await loadTasks();
            };

            document.getElementById('comment-send').onclick = async () => {
                const input = document.getElementById('comment-input');
                if (!input.value.trim()) return;
                await api(`/tasks/${currentId}/comments`, {
                    method: 'POST',
                    body: { body: input.value.trim() },
                });
                input.value = '';
                await Promise.all([loadComments(currentId), loadHistory(currentId)]);
            };

            // ---------- Toolbar ----------
            document.getElementById('view-mode').onchange = renderGantt;
            document.getElementById('today-btn').onclick = () =>
                gantt && gantt.scroll_current();
            document.getElementById('add-task-btn').onclick = async () => {
                const name = prompt('New task name:');
                if (!name) return;
                const today = new Date();
                const end = new Date();
                end.setDate(end.getDate() + 5);
                await api('/tasks', {
                    method: 'POST',
                    body: { name, start: fmt(today), end: fmt(end) },
                });
                await loadTasks();
            };

            if (isGuest) {
                document.getElementById('add-task-btn').style.display = 'none';
            }

            await loadTasks();
        </script>
    </body>
</html>
